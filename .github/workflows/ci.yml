name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check public env example
        run: npm run verify:env-example

      - name: Check committed secrets
        run: npm run verify:secrets

      - name: Verify contract artifact
        run: npm run contract:verify

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build
